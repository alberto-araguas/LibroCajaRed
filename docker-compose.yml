services:
  mysql:
    image: mysql:8.4
    container_name: libro-caja-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-libro_caja}
      MYSQL_USER: ${MYSQL_USER:-libro_caja_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: libro-caja-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://libro_caja_user:change_me@mysql:3306/libro_caja}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST:-smtp.office365.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      SMTP_TIMEOUT: ${SMTP_TIMEOUT:-30}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: libro-caja-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
